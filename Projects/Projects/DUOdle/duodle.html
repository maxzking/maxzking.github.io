<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Styles/duodle.css" />
    <title>Duodle</title>
    <!-- <link rel="icon" href="/Photos/favicon2.png" type="image/png" /> -->
  </head>
  <body>
    <div class="title-container">
      <div style="font-size: 36px; font-style: italic; font-weight: bold">
        DUO
      </div>
      <div style="font-size: 24px">dle</div>
    </div>
    <div class="error-message-container" id="errorMessage"></div>
    <div class="center-buttons-container">
      <button
        class="switch-turns-button"
        type="button"
        onclick="
          switchTurns();
          this.blur();
        "
      >
        Switch Turns
      </button>
      <button class="new-game-button" onclick="location.reload()">
        New Game
      </button>
    </div>
    <div class="end-game-container" id="endGameContainer">
      <span class="end-game-text" id="endGameText"></span>
      <div class="reveal-answers-container">
        <span class="reveal-answers-text" onclick="revealAnswers(this)"
          >Click to Reveal Answers</span
        >
        <div class="player-answers-container">
          <span class="player-1-answer" id="player-1-Answer"></span>
          <span class="player-2-answer" id="player-2-Answer"></span>
        </div>
      </div>
      <div class="end-game-buttons-container">
        <button
          class="keep-playing-button"
          id="keep-playing-button"
          onclick="keepPlaying()"
        >
          Keep Playing
        </button>
        <button
          class="end-of-game-button"
          id="endOfGameButton"
          onclick="location.reload()"
        >
          New Game
        </button>
      </div>
    </div>
    <div class="game-board-container">
      <div class="player-1-side">
        <h3>Player 1</h3>
        <div class="player-1-boards">
          <div class="player-1-answer-board">
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
            <div class="answer-cell"></div>
          </div>
          <div class="player-1-guess-board">
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
          </div>
        </div>
        <div class="player-1-keyboard">
          <div class="keyboard-row">
            <button class="letter-key">Q</button>
            <button class="letter-key">W</button>
            <button class="letter-key">E</button>
            <button class="letter-key">R</button>
            <button class="letter-key">T</button>
            <button class="letter-key">Y</button>
            <button class="letter-key">U</button>
            <button class="letter-key">I</button>
            <button class="letter-key">O</button>
            <button class="letter-key">P</button>
          </div>
          <div class="keyboard-row">
            <button class="letter-key">A</button>
            <button class="letter-key">S</button>
            <button class="letter-key">D</button>
            <button class="letter-key">F</button>
            <button class="letter-key">G</button>
            <button class="letter-key">H</button>
            <button class="letter-key">J</button>
            <button class="letter-key">K</button>
            <button class="letter-key">L</button>
          </div>
          <div class="keyboard-row">
            <button class="enter-key">ENTER</button>
            <button class="letter-key">Z</button>
            <button class="letter-key">X</button>
            <button class="letter-key">C</button>
            <button class="letter-key">V</button>
            <button class="letter-key">B</button>
            <button class="letter-key">N</button>
            <button class="letter-key">M</button>
            <button class="delete-key">DELETE</button>
          </div>
        </div>
      </div>
      <div class="player-2-side">
        <h3>Player 2</h3>
        <div class="player-2-boards">

            <div class="answer-cell"></div>
          </div>
          <div class="player-2-guess-board">
            <div class="guess-cell"></div>

            <div class="guess-cell"></div>

            <div class="guess-cell"></div>
            <div class="guess-cell"></div>
          </div>
        </div>
        <div class="player-2-keyboard">
          <div class="keyboard-row">
            <button class="letter-key">Q</button>
            <button class="letter-key">W</button>
            <button class="letter-key">E</button>
            <button class="letter-key">R</button>
            <button class="letter-key">T</button>
            <button class="letter-key">Y</button>
            <button class="letter-key">U</button>

            <button class="letter-key">O</button>
            <button class="letter-key">P</button>
          </div>
          <div class="keyboard-row">
            <button class="letter-key">A</button>
            <button class="letter-key">S</button>
            <button class="letter-key">D</button>
            <button class="letter-key">F</button>
            <button class="letter-key">G</button>
            <button class="letter-key">H</button>
            <button class="letter-key">J</button>
            <button class="letter-key">K</button>
            <button class="letter-key">L</button>
          </div>
          <div class="keyboard-row">
            <button class="enter-key">ENTER</button>
            <button class="letter-key">Z</button>
            <button class="letter-key">X</button>
            <button class="letter-key">C</button>
            <button class="letter-key">V</button>
            <button class="letter-key">B</button>
            <button class="letter-key">N</button>
            <button class="letter-key">M</button>
            <button class="delete-key">DELETE</button>
          </div>
        </div>
      </div>
    </div>
    <script src="duodle.js"></script>
  </body>
</html>
